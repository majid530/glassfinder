<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Glass Finder - Screen Protector Compatibility</title>
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;500;600;700&display=swap" rel="stylesheet">
  <style>
    :root {
      --primary-blue: #2563eb;
      --primary-blue-light: #3b82f6;
      --primary-blue-dark: #1d4ed8;
      --accent-cyan: #06b6d4;
      --glass-bg: rgba(255, 255, 255, 0.08);
      --glass-border: rgba(255, 255, 255, 0.15);
      --glass-shadow: 0 8px 32px 0 rgba(0, 0, 0, 0.37);
      --text-primary: #ffffff;
      --text-secondary: rgba(255, 255, 255, 0.7);
      --text-muted: rgba(255, 255, 255, 0.5);
      --success: #10b981;
      --error: #ef4444;
    }

    * {
      margin: 0;
      padding: 0;
      box-sizing: border-box;
    }

    body {
      font-family: 'Inter', -apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, sans-serif;
      min-height: 100vh;
      background: linear-gradient(135deg, #0a0a0a 0%, #0f172a 25%, #1e293b 50%, #0f172a 75%, #0a0a0a 100%);
      background-size: 400% 400%;
      animation: gradientShift 15s ease infinite, oilEffect 20s ease-in-out infinite;
      color: var(--text-primary);
      overflow-x: hidden;
      position: relative;
    }

    body::before {
      content: '';
      position: fixed;
      top: 0;
      left: 0;
      right: 0;
      bottom: 0;
      background:
        radial-gradient(ellipse at 20% 30%, rgba(37, 99, 235, 0.15) 0%, transparent 50%),
        radial-gradient(ellipse at 80% 70%, rgba(6, 182, 212, 0.1) 0%, transparent 50%),
        radial-gradient(ellipse at 50% 50%, rgba(30, 58, 138, 0.1) 0%, transparent 70%);
      pointer-events: none;
      z-index: 0;
    }

    @keyframes gradientShift {
      0% { background-position: 0% 50%; }
      50% { background-position: 100% 50%; }
      100% { background-position: 0% 50%; }
    }

    @keyframes oilEffect {
      0%, 100% {
        filter: hue-rotate(0deg) brightness(1);
      }
      25% {
        filter: hue-rotate(5deg) brightness(1.02);
      }
      50% {
        filter: hue-rotate(-5deg) brightness(1);
      }
      75% {
        filter: hue-rotate(3deg) brightness(1.01);
      }
    }

    .container {
      min-height: 100vh;
      display: flex;
      align-items: center;
      justify-content: center;
      padding: 2rem;
      position: relative;
      z-index: 1;
    }

    .glass-card {
      background: var(--glass-bg);
      backdrop-filter: blur(20px);
      -webkit-backdrop-filter: blur(20px);
      border-radius: 24px;
      border: 1px solid var(--glass-border);
      box-shadow: var(--glass-shadow);
      padding: 3rem;
      max-width: 540px;
      width: 100%;
      position: relative;
      overflow: hidden;
      animation: fadeInUp 0.6s ease-out;
    }

    .glass-card::before {
      content: '';
      position: absolute;
      top: -2px;
      left: -2px;
      right: -2px;
      bottom: -2px;
      background: linear-gradient(135deg, rgba(255,255,255,0.1) 0%, transparent 50%, rgba(255,255,255,0.05) 100%);
      border-radius: 24px;
      z-index: -1;
    }

    @keyframes fadeInUp {
      from {
        opacity: 0;
        transform: translateY(20px);
      }
      to {
        opacity: 1;
        transform: translateY(0);
      }
    }

    .title {
      font-size: 2.75rem;
      font-weight: 700;
      margin-bottom: 0.5rem;
      background: linear-gradient(135deg, #ffffff 0%, #cbd5e1 100%);
      -webkit-background-clip: text;
      -webkit-text-fill-color: transparent;
      background-clip: text;
      letter-spacing: -0.02em;
      text-align: center;
    }

    .subtitle {
      font-size: 1rem;
      color: var(--text-secondary);
      text-align: center;
      margin-bottom: 2rem;
      font-weight: 400;
    }

    .search-container {
      display: flex;
      flex-direction: column;
      gap: 1rem;
      margin-bottom: 2rem;
    }

    .search-input {
      width: 100%;
      padding: 1rem 1.25rem;
      font-size: 1rem;
      font-family: inherit;
      background: rgba(255, 255, 255, 0.04);
      border: 1px solid rgba(255, 255, 255, 0.1);
      border-radius: 12px;
      color: var(--text-primary);
      outline: none;
      transition: all 0.3s ease;
    }

    .search-input::placeholder {
      color: var(--text-muted);
    }

    .search-input:focus {
      background: rgba(255, 255, 255, 0.06);
      border-color: var(--primary-blue);
      box-shadow: 0 0 0 3px rgba(37, 99, 235, 0.2);
    }

    .search-button {
      display: flex;
      align-items: center;
      justify-content: center;
      gap: 0.5rem;
      width: 100%;
      padding: 1rem 1.5rem;
      font-size: 1.05rem;
      font-weight: 600;
      font-family: inherit;
      background: linear-gradient(135deg, var(--primary-blue) 0%, var(--primary-blue-light) 50%, var(--accent-cyan) 100%);
      background-size: 200% 200%;
      border: none;
      border-radius: 12px;
      color: white;
      cursor: pointer;
      transition: all 0.3s ease;
      box-shadow: 0 4px 15px rgba(37, 99, 235, 0.3);
    }

    .search-button:hover {
      transform: translateY(-2px);
      box-shadow: 0 6px 20px rgba(37, 99, 235, 0.4);
      background-position: 100% 100%;
    }

    .search-button:active {
      transform: translateY(0);
      box-shadow: 0 2px 10px rgba(37, 99, 235, 0.3);
    }

    .search-icon {
      flex-shrink: 0;
    }

    .results-container {
      min-height: 100px;
    }

    .loading {
      display: flex;
      flex-direction: column;
      align-items: center;
      justify-content: center;
      gap: 1rem;
      padding: 2rem;
      color: var(--text-secondary);
    }

    .spinner {
      width: 32px;
      height: 32px;
      border: 3px solid rgba(255, 255, 255, 0.1);
      border-top-color: var(--primary-blue);
      border-radius: 50%;
      animation: spin 0.8s linear infinite;
    }

    @keyframes spin {
      to { transform: rotate(360deg); }
    }

    .message-card {
      display: flex;
      flex-direction: column;
      align-items: center;
      gap: 0.75rem;
      padding: 2rem;
      text-align: center;
      background: rgba(255, 255, 255, 0.03);
      border-radius: 12px;
      border: 1px solid rgba(255, 255, 255, 0.08);
    }

    .message-card.error {
      background: rgba(239, 68, 68, 0.08);
      border-color: rgba(239, 68, 68, 0.2);
    }

    .message-icon {
      color: var(--text-muted);
    }

    .message-card.error .message-icon {
      color: var(--error);
    }

    .message-card p {
      color: var(--text-secondary);
      font-size: 0.95rem;
    }

    .message-card .sub-message {
      color: var(--text-muted);
      font-size: 0.85rem;
      margin-top: 0.25rem;
    }

    .result-header {
      margin-bottom: 1.25rem;
    }

    .result-header h3 {
      font-size: 1.15rem;
      font-weight: 600;
      color: var(--text-primary);
      margin-bottom: 0.25rem;
    }

    .result-header .highlight {
      background: linear-gradient(135deg, var(--primary-blue-light) 0%, var(--accent-cyan) 100%);
      -webkit-background-clip: text;
      -webkit-text-fill-color: transparent;
      background-clip: text;
    }

    .result-count {
      font-size: 0.9rem;
      color: var(--text-muted);
    }

    .result-card {
      display: flex;
      align-items: center;
      gap: 0.875rem;
      padding: 1rem 1.25rem;
      background: linear-gradient(135deg, rgba(255, 255, 255, 0.05) 0%, rgba(255, 255, 255, 0.02) 100%);
      border: 1px solid rgba(255, 255, 255, 0.1);
      border-radius: 12px;
      transition: all 0.3s ease;
      animation: slideIn 0.4s ease-out;
    }

    @keyframes slideIn {
      from {
        opacity: 0;
        transform: translateX(-10px);
      }
      to {
        opacity: 1;
        transform: translateX(0);
      }
    }

    .result-card:hover {
      background: linear-gradient(135deg, rgba(37, 99, 235, 0.15) 0%, rgba(6, 182, 212, 0.1) 100%);
      border-color: rgba(59, 130, 246, 0.3);
      transform: translateX(5px);
    }

    .checkmark {
      color: var(--success);
      flex-shrink: 0;
    }

    .compatible-models {
      font-size: 1rem;
      font-weight: 500;
      color: var(--text-primary);
      line-height: 1.5;
    }

    @media (max-width: 640px) {
      .container {
        padding: 1rem;
      }

      .glass-card {
        padding: 2rem 1.5rem;
      }

      .title {
        font-size: 2rem;
      }

      .subtitle {
        font-size: 0.9rem;
      }

      .search-input,
      .search-button {
        padding: 0.875rem 1rem;
        font-size: 0.95rem;
      }

      .result-card {
        padding: 0.875rem 1rem;
      }
    }
  </style>
</head>
<body>
  <div class="container">
    <div class="glass-card">
      <h1 class="title">Glass Finder</h1>
      <p class="subtitle">با یه کلیک گلس مشابه رو پیدا کن</p>

      <div class="search-container">
        <input
          type="text"
          id="searchInput"
          class="search-input"
          placeholder="مدل گوشی را وارد کنید... (مثلاً A15)"
          autocomplete="off"
        >
        <button id="searchBtn" class="search-button">
          <span>جستجو</span>
          <svg class="search-icon" width="20" height="20" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round">
            <circle cx="11" cy="11" r="8"></circle>
            <path d="m21 21-4.35-4.35"></path>
          </svg>
        </button>
      </div>

      <div id="results" class="results-container"></div>
    </div>
  </div>

  <script>
    // Compatibility data directly embedded
    const compatibilityGroups = [
      {
        id: 1,
        name: 'Universal Fit',
        models: ['Poco X3', 'A21s', 'Note 11 Pro']
      },
      {
        id: 2,
        name: 'Samsung A Series Compatible',
        models: ['A15', 'A26', 'A17']
      },
      {
        id: 3,
        name: 'Samsung A Series Compatible',
        models: ['A12', 'A13']
      },
      {
    id: 4,
    name: 'Group 4',
    models: ['A05', 'A06', 'A07', 'MI13C', 'Poco C65', 'Poco M6']
},
{
    id: 5,
    name: 'Group 5',
    models: ['A10', 'A10s', 'M20']
},
{
    id: 6,
    name: 'Group 6',
    models: ['A11', 'Note9', 'Mi 11 Lite']
},
{
    id: 7,
    name: 'Group 7',
    models: ['A12', 'A13', 'A02', 'A02s', 'A03', 'A03s', 'A23', 'A04', 'A70']
},
{
    id: 8,
    name: 'Group 8',
    models: ['A14', 'A22 5G', 'M14']
},
{
    id: 9,
    name: 'Group 9',
    models: ['A15', 'A24', 'A25', 'A34 4G']
},
{
    id: 10,
    name: 'Group 10',
    models: ['A16', 'A26', 'A17']
},
{
    id: 11,
    name: 'Group 11',
    models: ['A22 4G', 'A32 4G', 'A31', 'A33 5G']
},
{
    id: 12,
    name: 'Group 12',
    models: ['A51', 'A52', 'A53', 'S20 FE']
},
{
    id: 13,
    name: 'Group 13',
    models: ['A54', 'S23 FE']
},
{
    id: 14,
    name: 'Group 14',
    models: ['A56', 'A35', 'A36', 'S24 FE', 'S25 FE', 'S26 FE', 'A37', 'A57']
},
{
    id: 15,
    name: 'Group 15',
    models: ['A37', 'A57']
},
{
    id: 16,
    name: 'Group 16',
    models: ['A71', 'A72', 'A73', 'Poco X5 Pro', 'Note 12 Pro+', 'Poco X4 Pro']
},
{
    id: 17,
    name: 'Group 17',
    models: ['S21 FE']
},
{
    id: 18,
    name: 'Group 18',
    models: ['A34 5G']
},
{
    id: 19,
    name: 'Group 19',
    models: ['Note 8 Pro', 'Poco M3']
},
{
    id: 20,
    name: 'Group 20',
    models: ['Note 11', 'Note 11S', 'Note 12S', 'Note 10', 'Poco M4 Pro']
},
{
    id: 21,
    name: 'Group 21',
    models: ['Note 12 Pro', 'Poco X4 GT', 'Note 11T Pro']
},
{
    id: 22,
    name: 'Group 22',
    models: ['Note 12 4G', 'Poco X5']
},
{
    id: 23,
    name: 'Group 23',
    models: ['Note 13 Pro 4G', 'Poco X3', 'Note 14', 'Note 14S']
},
{
    id: 24,
    name: 'Group 24',
    models: ['Note 13 Pro 5G', 'Poco X7 Pro', 'Poco X6 Pro', 'Darya Bond 2']
},
{
    id: 25,
    name: 'Group 25',
    models: ['Redmi 14C', 'Poco C75', 'Mi A5']
},
{
    id: 26,
    name: 'Group 26',
    models: ['Redmi 15', 'Poco M7']
},
{
    id: 27,
    name: 'Group 27',
    models: ['Redmi 15C', 'Poco C85']
},
{
    id: 28,
    name: 'Group 28',
    models: ['Redmi 12C', 'Redmi 10C', 'Poco C40', 'C55']
},
{
    id: 29,
    name: 'Group 29',
    models: ['Redmi 12', 'Poco M6 Pro', 'Redmi 13', 'Redmi A3']
},
    ];

    const searchInput = document.getElementById('searchInput');
    const searchBtn = document.getElementById('searchBtn');
    const resultsContainer = document.getElementById('results');

    function normalizeText(text) {
      return text.toLowerCase().replace(/\s+/g, '');
    }

    function searchCompatibleModels(searchTerm) {
      const term = normalizeText(searchTerm);

      if (!term) {
        resultsContainer.innerHTML = `
          <div class="message-card">
            <svg class="message-icon" width="24" height="24" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2">
              <circle cx="12" cy="12" r="10"></circle>
              <path d="M12 16v-4"></path>
              <path d="M12 8h.01"></path>
            </svg>
            <p>لطفا مدل گوشی را وارد کنید</p>
          </div>
        `;
        return;
      }

      // Find the model and its group
      let matchedModel = null;
      let matchedGroup = null;

      for (const group of compatibilityGroups) {
        const found = group.models.find(model =>
          normalizeText(model).includes(term)
        );
        if (found) {
          matchedModel = found;
          matchedGroup = group;
          break;
        }
      }

      if (!matchedModel) {
        resultsContainer.innerHTML = `
          <div class="message-card error">
            <svg class="message-icon" width="24" height="24" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2">
              <circle cx="12" cy="12" r="10"></circle>
              <path d="m15 9-6 6"></path>
              <path d="m9 9 6 6"></path>
            </svg>
            <p>مدلی یافت نشد</p>
          </div>
        `;
        return;
      }

      // Get compatible models from the same group
      const compatibleModels = matchedGroup.models.filter(model =>
        normalizeText(model) !== normalizeText(matchedModel)
      );

      resultsContainer.innerHTML = `
        <div class="result-header">
          <h3>مشابه با <span class="highlight">${matchedModel}</span></h3>
          <p class="result-count">${compatibleModels.length} مدل مشابه</p>
        </div>
        <div class="result-card">
          <svg class="checkmark" width="24" height="24" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.5">
            <polyline points="20 6 9 17 4 12"></polyline>
          </svg>
          <span class="compatible-models">${compatibleModels.join(', ')}</span>
        </div>
      `;
    }

    searchBtn.addEventListener('click', () => {
      searchCompatibleModels(searchInput.value);
    });

    searchInput.addEventListener('keypress', (e) => {
      if (e.key === 'Enter') {
        searchCompatibleModels(searchInput.value);
      }
    });

    // Focus input on load
    searchInput.focus();
  </script>
</body>
</html>
